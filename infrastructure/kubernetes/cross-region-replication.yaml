apiVersion: apps/v1
kind: Deployment
metadata:
  name: sc-intel-data-replicator
  namespace: sc-platform
  labels:
    app: sc-intel-replicator
    tier: infrastructure
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sc-intel-replicator
  template:
    metadata:
      labels:
        app: sc-intel-replicator
    spec:
      containers:
      - name: replicator
        image: sc-intelligence-replicator:v1.2.0
        env:
        - name: PRIMARY_REGION_DB_URL
          valueFrom:
            secretKeyRef:
              name: db-secrets
              key: primary-url
        - name: SECONDARY_REGION_DB_URL
          valueFrom:
            secretKeyRef:
              name: db-secrets
              key: secondary-url
        resources:
          requests:
            cpu: "250m"
            memory: "512Mi"
          limits:
            cpu: "500m"
            memory: "1Gi"
        livenessProbe:
          httpGet:
            path: /health/live
            port: 8080
          initialDelaySeconds: 30
        readinessProbe:
          httpGet:
            path: /health/ready
            port: 8080
          initialDelaySeconds: 15

---
apiVersion: v1
kind: Service
metadata:
  name: sc-intel-global-lb
  namespace: sc-platform
  annotations:
    external-dns.alpha.kubernetes.io/hostname: "api.sc-intel-global.com"
spec:
  type: LoadBalancer
  selector:
    app: sc-intel-api
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8000
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: sc-intel-region-config
  namespace: sc-platform
data:
  current-region: "us-east-1"
  primary-region: "us-east-1"
  dr-region: "us-west-2"
  replication-mode: "async"
