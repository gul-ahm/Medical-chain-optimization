apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-orchestration-service
  namespace: medical-supply
  labels:
    app: ai-orchestration-service
    tier: ai
spec:
  replicas: 3
  selector:
    matchLabels:
      app: ai-orchestration-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: ai-orchestration-service
    spec:
      containers:
      - name: ai-orchestration-service
        image: medical-supply/ai-orchestration:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8008
          name: http-api
        env:
        - name: REDIS_HOST
          value: "redis-master.medical-supply.svc.cluster.local"
        - name: KAFKA_BOOTSTRAP_SERVERS
          value: "kafka.medical-supply.svc.cluster.local:9092"
        - name: OLLAMA_BASE_URL
          value: "http://ollama-service.medical-supply.svc.cluster.local:11434"
        resources:
          requests:
            memory: "2Gi"
            cpu: "1000m"
          limits:
            memory: "4Gi"
            cpu: "2000m"
        readinessProbe:
          httpGet:
            path: /health/readiness
            port: 8008
          initialDelaySeconds: 15
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health/readiness
            port: 8008
          initialDelaySeconds: 30
          periodSeconds: 20

---
apiVersion: v1
kind: Service
metadata:
  name: ai-orchestration-service
  namespace: medical-supply
  labels:
    app: ai-orchestration-service
spec:
  ports:
  - port: 8008
    targetPort: 8008
    name: http
  selector:
    app: ai-orchestration-service
  type: ClusterIP

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ai-orchestration-service-hpa
  namespace: medical-supply
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ai-orchestration-service
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 75
